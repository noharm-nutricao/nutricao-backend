name: Mirror main and develop to AGES GitLab

on:
  push:
    branches:
      - main
      - develop
  workflow_dispatch:

jobs:
  mirror:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Git
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"

      - name: Add GitLab remote
        run: |
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@tools.ages.pucrs.br/m-dulo-de-nutri-o/nitra-backend.git

      - name: Push main and develop
        run: |
          git push gitlab main
          git push gitlab develop